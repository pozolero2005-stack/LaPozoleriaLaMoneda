<main class="container min-vh-100 d-flex flex-column align-items-center py-5">
  
  <section class="log-book-container w-100 p-3 p-md-4" style="max-width: 700px;">
    
    <header class="log-book-header text-center mb-5">
      <h1 class="font-weight-bold fs-2 mb-2" style="color: rgb(220, 214, 35);">
        Registro Diario de Jornada
      </h1>
      <p class="text-muted h6 font-weight-light uppercase" style="letter-spacing: 1px;">La Pozolería • Libro de Cuentas</p>
    </header>
    
    <form [formGroup]="formularioFinanciero" (ngSubmit)="guardarDia()" aria-label="Formulario de balance financiero diario">
      
      <div class="date-header text-center mb-5">
        <label for="fecha" class="form-label d-block small uppercase text-muted font-weight-bold" style="letter-spacing: 0.5px;">Fecha de la Jornada</label>
        <input type="date" id="fecha" formControlName="fecha" class="form-control text-center date-input bg-transparent text-white p-0 h3 font-weight-bold" required>
        <hr class="border-secondary mt-2 mb-0" style="width: 150px; margin: 0 auto;">
      </div>

      <fieldset class="input-set mb-5 border-0 p-0">
        <legend class="h6 uppercase mb-4 pb-2 border-bottom border-secondary font-weight-bold" style="color: #ff4d4d; letter-spacing: 1px;">1. Costos y Merma del Día</legend>
        <div class="log-rows-container">
          
          <div class="row align-items-center mb-3">
            <div class="col-6">
              <label for="inversion" class="label-text small">Inversión (Suma de Insumos)</label>
            </div>
            <div class="col-6">
              <div class="log-input-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="inversion" formControlName="inversion" class="form-control log-input" min="0">
              </div>
            </div>
          </div>
          
          <div class="row align-items-center mb-3">
            <div class="col-6">
              <label for="merma" class="label-text small">Merma (Vasos / Consumo)</label>
            </div>
            <div class="col-6">
              <div class="log-input-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="merma" formControlName="merma" class="form-control log-input" min="0">
              </div>
            </div>
          </div>
        
        </div>
      </fieldset>

      <fieldset class="input-set mb-5 border-0 p-0">
        <legend class="h6 uppercase mb-4 pb-2 border-bottom border-secondary font-weight-bold" style="color: #4da6ff; letter-spacing: 1px;">2. Flujo e Ingresos de Ruta</legend>
        <div class="log-rows-container">
          
          <div class="row align-items-center mb-3">
            <div class="col-6">
              <label for="cajaInicial" class="label-text small">Cambio Inicial (Caja Chica)</label>
            </div>
            <div class="col-6">
              <div class="log-input-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="cajaInicial" formControlName="cajaInicial" class="form-control log-input" min="0">
              </div>
            </div>
          </div>

          <div class="row align-items-center mb-3">
            <div class="col-6">
              <label for="ventaEfectivo" class="label-text small">Venta Total en Efectivo</label>
            </div>
            <div class="col-6">
              <div class="log-input-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="ventaEfectivo" formControlName="ventaEfectivo" class="form-control log-input" min="0">
              </div>
            </div>
          </div>

          <div class="row align-items-center mb-3">
            <div class="col-6">
              <label for="ventaElectronica" class="label-text small">Venta Electrónica (Tarjeta)</label>
            </div>
            <div class="col-6">
              <div class="log-input-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="ventaElectronica" formControlName="ventaElectronica" class="form-control log-input" min="0">
              </div>
            </div>
          </div>
        
        </div>
      </fieldset>

      <div class="final-balance p-4 rounded-3 text-center border border-success" style="background-color: rgba(25, 135, 84, 0.03);" role="region" aria-live="polite" aria-label="Cálculo de ganancia neta">
        <label for="libre" class="form-label uppercase small font-weight-bold mb-3 d-block text-success" style="letter-spacing: 1px;">Dinero Libre (Ganancia Neta)</label>
        <div class="balance-display d-flex justify-content-center align-items-baseline">
          <span class="currency-symbol-final fs-2 font-weight-bold me-1" style="color: #198754;">$</span>
          <input type="number" id="libre" formControlName="libre" class="bg-transparent text-success border-0 text-center font-weight-bold h1 m-0 p-0 fs-1 readonly-input" readonly>
        </div>
      </div>

      <div class="d-grid gap-2 pt-4">
        <button type="submit" class="btn btn-success btn-lg font-weight-bold uppercase py-3 fs-5" style="border-radius: 6px;">
          Guardar Jornada Financiera
        </button>
      </div>

    </form>
  </section>
</main>
