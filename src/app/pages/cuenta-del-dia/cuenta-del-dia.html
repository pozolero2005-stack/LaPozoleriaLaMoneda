<main class="container py-5">
  <form [formGroup]="formularioFinanciero" (ngSubmit)="guardarDia()" class="form-cyber">
    
    <!-- ENCABEZADO CON SELECTOR DE FECHA -->
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
      <h2 class="h3 m-0 text-success fw-bold">Cuenta del Día</h2>
      <div class="col-md-3 col-6">
        <input type="date" formControlName="fecha" class="form-control input-fecha text-center">
      </div>
    </div>

    <div class="row g-4">
      <!-- SECCIÓN IZQUIERDA: VASOS VENDIDOS -->
      <div class="col-lg-6">
        <div class="card bg-dark-glass border-success h-100 p-4">
          <h3 class="text-info h5 mb-4 border-bottom border-secondary pb-2 fw-bold">Vasos Vendidos</h3>
          
          <!-- Encabezados de columnas pequeños -->
          <div class="row mb-2 text-info small fw-bold">
            <div class="col-4">Productos</div>
            <div class="col-4 text-center">Vasos Vendidos</div>
            <div class="col-4 text-center">Precio ($)</div>
          </div>

          <!-- Fila Cacao -->
          <div class="row align-items-center mb-3">
            <div class="col-4 text-white fw-semibold">Cacao</div>
            <div class="col-4"><input type="number" formControlName="vasosCacao" class="form-control bg-dark-input text-white text-center" placeholder="0"></div>
            <div class="col-4"><input type="number" formControlName="precioCacao" class="form-control bg-dark-input text-white text-center" placeholder="20"></div>
          </div>

          <!-- Fila Cacahuate -->
          <div class="row align-items-center mb-3">
            <div class="col-4 text-white fw-semibold">Cacahuate</div>
            <div class="col-4"><input type="number" formControlName="vasosCacahuate" class="form-control bg-dark-input text-white text-center" placeholder="0"></div>
            <div class="col-4"><input type="number" formControlName="precioCacahuate" class="form-control bg-dark-input text-white text-center" placeholder="20"></div>
          </div>

          <!-- Fila Blanco -->
          <div class="row align-items-center mb-3">
            <div class="col-4 text-white fw-semibold">Blanco</div>
            <div class="col-4"><input type="number" formControlName="vasosBlanco" class="form-control bg-dark-input text-white text-center" placeholder="0"></div>
            <div class="col-4"><input type="number" formControlName="precioBlanco" class="form-control bg-dark-input text-white text-center" placeholder="15"></div>
          </div>
        </div>
      </div>

      <!-- SECCIÓN DERECHA: GASTOS Y MERMA -->
      <div class="col-lg-6">
        <div class="card bg-dark-glass border-warning h-100 p-4 d-flex flex-column">
          <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-2">
            <h3 class="text-warning h5 m-0 fw-bold">Gastos Operativos</h3>
            <button type="button" class="btn btn-sm btn-outline-warning rounded-circle px-2 fw-bold" (click)="anadirGasto()">+</button>
          </div>

          <!-- Contenedor con scroll si hay muchos gastos -->
          <div formArrayName="listaGastos" class="flex-grow-1 overflow-auto mb-3pe-1" style="max-height: 180px;">
            <div *ngFor="let g of listaGastosControls; let i = index" [formGroupName]="i" class="row g-2 mb-2 align-items-center">
              <div class="col-6">
                <input type="text" formControlName="concepto" class="form-control bg-dark-input text-white" placeholder="Ej. Hielo, Bolsas">
              </div>
              <div class="col-4">
                <div class="input-group">
                  <span class="input-group-text bg-dark-input border-end-0 text-muted small">$</span>
                  <input type="number" formControlName="costo" class="form-control bg-dark-input text-white text-center">
                </div>
              </div>
              <div class="col-2 text-end">
                <button type="button" class="btn btn-sm btn-outline-danger border-0" (click)="eliminarGasto(i)">✕</button>
              </div>
            </div>
          </div>

          <!-- Control de Merma alineado abajo -->
          <div class="mt-auto pt-3 border-top border-secondary">
            <div class="row align-items-center">
              <div class="col-6 text-white small fw-bold">Valor de Merma del Día:</div>
              <div class="col-6">
                <div class="input-group">
                  <span class="input-group-text bg-dark-input border-end-0 text-danger small">$</span>
                  <input type="number" formControlName="merma" class="form-control bg-dark-input text-danger text-center fw-bold" placeholder="0">
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- RESUMEN EN PANALES DE CRISTAL DE ALTO CONTRASTE -->
    <div class="row mt-4">
      <div class="col-12">
        <div class="row g-3 p-4 bg-dark-glass border border-success rounded text-center">
          <div class="col-md-4">
            <span class="text-white small d-block mb-1">Venta Bruta Total:</span>
            <h4 class="text-info m-0 fw-bold">{{ totalVentaBruta | currency }}</h4>
          </div>
          <div class="col-md-4">
            <span class="text-white small d-block mb-1">Inversión / Gastos:</span>
            <h4 class="text-danger m-0 fw-bold">- {{ totalGastos | currency }}</h4>
          </div>
          <div class="col-md-4">
            <span class="text-white small d-block mb-1">Dinero Neto Disponible:</span>
            <h4 class="text-success m-0 fw-bold glow-text">{{ dineroFinal | currency }}</h4>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTÓN ACCIÓN DE GUARDADO -->
    <div class="d-flex justify-content-end mt-4">
      <button type="submit" class="btn btn-guardar px-5 py-2">
        Guardar Jornada del Día
      </button>
    </div>

  </form>
</main>
